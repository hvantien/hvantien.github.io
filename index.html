<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Page Scroll</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="section" id="section1">
        <video id="video1" class="full-screen-video" muted autoplay>
            <source id="video-source" src="session1.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    <div class="section" id="section2">
        <video id="video2" class="full-screen-video" muted autoplay loop>
            <source id="video-source" src="session2.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <a id="open-popup-btn" class="apple-button">Open Popup</a>
    </div>
    <div class="section" id="section3">
        <!-- Content for section 3 -->
    </div>

    <div class="pagination">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>

    <div id="popup" class="popup">
        <img class="img-popup" src="1.png" alt="">
        <img class="img-popup" src="2.png" alt="">
        <img class="img-popup" src="3.png" alt="">
        <button id="close-popup-btn">Close Popup</button>
    </div>
    <div id="popup-overlay" class="popup-overlay"></div>

    <script src="script.js"></script>
</body>
</html>
