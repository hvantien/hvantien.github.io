<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="The Beautiful Wedding of Hoài Nhi & Văn Tiến">
    <meta property="og:description"
        content="We warmly invite you to celebrate with us on our special day. Let's share this memorable moment together!">
    <meta property="og:image" content="https://hvantien-github-io.vercel.app/img/img-meta.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://hvantien-github-io.vercel.app/">
    <meta property="og:type" content="website">
    <meta property="fb:app_id" content="7486099698158932">
    <title>Wedding</title>
    <link rel="icon" type="image/x-icon" href="/img/wedding-day.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Swiper/4.3.5/css/swiper.min.css">
    <link href="https://unpkg.com/@fullcalendar/core@6.0.0/main.min.css" rel="stylesheet" />
    <link href="https://unpkg.com/@fullcalendar/daygrid@6.0.0/main.min.css" rel="stylesheet" />
</head>

<body>
    <div class="container-fluid">
        <div class="session-page section session1 active">
            <div class="title-s3 color-s3">
                Save The Date
            </div>
            <div class="date-of-week-s3 color-s3">
                SUNDAY
            </div>
            <div class="date-s3 color-s3">
                <div class="month-s3">
                    SEP
                </div>
                <div class="day-s3">
                    22
                </div>
                <div class="year-s3">
                    2024
                </div>
            </div>
            <div class="countdown-container">
                <div class="countdown-item">
                    <span id="days">00</span>
                    <p>Ngày</p>
                </div>
                <div class="countdown-item">
                    <span id="hours">00</span>
                    <p>Giờ</p>
                </div>
                <div class="countdown-item">
                    <span id="minutes">00</span>
                    <p>Phút</p>
                </div>
                <div class="countdown-item">
                    <span id="seconds">00</span>
                    <p>Giây</p>
                </div>
            </div>
        </div>
        <div class="session-page section session2">
            <div>
                <button type="button" class="more-button" data-bs-toggle="modal" data-bs-target="#exampleModal">
                    <div class="text-button">
                        Show more
                    </div>
                    <div>
                        <i class="fa-solid fa-plus icon-button"></i>
                    </div>
                </button>
            </div>
            <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel"
                aria-hidden="true">
                <div class="modal-dialog modal-lg modal-dialog-scrollable">
                    <div class="modal-content">
                        <button type="button" class="btn-close-1" data-bs-dismiss="modal" aria-label="Close">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                        <div class="modal-body">
                            <img src="img/1.png" alt="">
                            <img src="img/2.png" alt="">
                            <img src="img/3.png" alt="">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="session-page section session3">
            <div class="grid-container">
                <div class="blog-slider grid-item">
                    <div class="blog-slider__wrp swiper-wrapper">
                        <div class="blog-slider__item swiper-slide">
                            <div class="blog-slider__img">
                                <img src="img/goldenphonix.jpg" alt="">
                            </div>
                            <div class="blog-slider__content">
                                <div class="blog-slider__title fade-in">Lễ Vu Quy</div>
                                <div class="blog-slider__bottom fade-in">
                                    <div class="blog-slider__date">
                                        <div class="blog-date-icon"><i class="fa-regular fa-calendar-days"></i></div>
                                        <div class="blog-date-text">
                                            <span>22/09/2024</span>
                                            <br>
                                            <span class="text-small">11:00h</span>
                                        </div>
                                    </div>
                                    <div class="blog-slider__text">
                                        <div class="blog-location-icon"><i class="fa-solid fa-location-dot"></i></div>
                                        <div class="blog-location-text">
                                            <span>Golden Phoenix - Sảnh A</span>
                                            <br>
                                            <span class="text-small">Đ. 2 Tháng 9, Hoà Cường Bắc, Hải Châu, Đà
                                                Nẵng</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="list-button show-button">
                                    <add-to-calendar-button name="Wedding Tiến & Nhi" options="'Apple','Google'"
                                        location="Sảnh A, Golden Phoenix, Đ. 2 Tháng 9, Hoà Cường Bắc, Hải Châu, Đà Nẵng"
                                        startDate="2024-09-22" endDate="2024-09-22" startTime="11:00" endTime="13:00"
                                        timeZone="Asia/Ho_Chi_Minh" listStyle="dropup-static" hideBackground size="3"
                                        label="Thêm vào lịch" buttonStyle="round" trigger="click">
                                    </add-to-calendar-button>
                                    <button onclick="openLocation()" class="btn-location">
                                        <i class="fa-solid fa-location-dot"></i> Xem Địa Chỉ
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="blog-slider grid-item">
                    <div class="blog-slider__wrp swiper-wrapper">
                        <div class="blog-slider__item swiper-slide">
                            <div class="blog-slider__img">
                                <img src="img/mekong.jpg" alt="">
                            </div>
                            <div class="blog-slider__content">
                                <div class="blog-slider__title fade-in">Lễ Thành Hôn</div>
                                <div class="blog-slider__bottom fade-in">
                                    <div class="blog-slider__date">
                                        <div class="blog-date-icon"><i class="fa-regular fa-calendar-days"></i></div>
                                        <div class="blog-date-text">
                                            <span>28/09/2024</span>
                                            <br>
                                            <span class="text-small">11:00h</span>
                                        </div>
                                    </div>
                                    <div class="blog-slider__text">
                                        <div class="blog-location-icon"><i class="fa-solid fa-location-dot"></i></div>
                                        <div class="blog-location-text">
                                            <span>Mê Kông - Tầng 1</span>
                                            <br>
                                            <span class="text-small">66 Lê Duẫn, TP.Đông Hà, T.Quảng Trị</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="list-button show-button">
                                    <add-to-calendar-button name="Wedding Tiến & Nhi" options="'Apple','Google'"
                                        location="Mê Kông - Tầng 1, 66 Lê Duẫn, TP.Đông Hà, T.Quảng Trị"
                                        startDate="2024-09-28" endDate="2024-09-28" startTime="11:00" endTime="13:00"
                                        timeZone="Asia/Ho_Chi_Minh" listStyle="dropup-static" hideBackground size="3"
                                        label="Thêm vào lịch" buttonStyle="round" trigger="click">
                                    </add-to-calendar-button>
                                    <button onclick="openLocation1()" class="btn-location">
                                        <i class="fa-solid fa-location-dot"></i> Xem Địa Chỉ
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="session-page section session4">
        </div>
    </div>
    <div class="pagination dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/add-to-calendar-button@2" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Swiper/4.3.5/js/swiper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
    <script>
        function openLocation() {
            const address = "A8.2 Lô 1,2 Đ. 2 Tháng 9, Hoà Cường Bắc, Hải Châu, Đà Nẵng, Việt Nam";
            const url = `https://www.google.com/maps?q=${encodeURIComponent(address)}`;
            window.open(url, "_blank");
        }

        function openLocation1() {
            const address = "66 Lê Duẩn, Đông Thanh, Đông Hà, Quảng Trị, Việt Nam";
            const url = `https://www.google.com/maps?q=${encodeURIComponent(address)}`;
            window.open(url, "_blank");
        }
    </script>
</body>

</html>
