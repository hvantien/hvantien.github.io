<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="The Beautiful Wedding of Hoài Nhi & Văn Tiến">
    <meta property="og:description" content="We warmly invite you to celebrate with us on our special day. Let's share this memorable moment together!">
    <meta property="og:image" content="https://hvantien-github-io.vercel.app/img/session1-img.jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://hvantien-github-io.vercel.app/">
    <meta property="og:type" content="website">
    <title>Wedding</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>
    <div class="container-fluid">
        <div class="session-page section session1 active">
            <div class="title-s3 color-s3">
                Save The Date
            </div>
            <div class="date-of-week-s3 color-s3">
                SUNDAY
            </div>
            <div class="date-s3 color-s3">
                <div class="month-s3">
                    SEP
                </div>
                <div class="day-s3">
                    22
                </div>
                <div class="year-s3">
                    2024
                </div>
            </div>
            <div class="countdown-container">
                <div class="countdown-item">
                    <span id="days">00</span>
                    <p>Ngày</p>
                </div>
                <div class="countdown-item">
                    <span id="hours">00</span>
                    <p>Giờ</p>
                </div>
                <div class="countdown-item">
                    <span id="minutes">00</span>
                    <p>Phút</p>
                </div>
                <div class="countdown-item">
                    <span id="seconds">00</span>
                    <p>Giây</p>
                </div>
            </div>
        </div>
        <div class="session-page section session2">
            <div>
                <button type="button" class="more-button" data-bs-toggle="modal" data-bs-target="#exampleModal">
                    <div class="text-button">
                        Show more
                    </div>
                    <div>
                        <i class="fa-solid fa-plus icon-button"></i>
                    </div>
                </button>
            </div>
            <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
                <div class="modal-dialog modal-lg modal-dialog-scrollable">
                    <div class="modal-content">
                        <button type="button" class="btn-close-1" data-bs-dismiss="modal" aria-label="Close">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                        <div class="modal-body">
                            <img src="img/1.png" alt="">
                            <img src="img/2.png" alt="">
                            <img src="img/3.png" alt="">
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="session-page section session3">

        </div>


        <div class="pagination dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>

        
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
