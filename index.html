<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>
    <div class="container-fluid">
        <div class="row session1">
            <div class="col-6 s1-left">
                <div class="pngtree-img">
                    <img src="pngtree.png" alt="">
                </div>
                <div class="pngtree-img-2">
                    <img src="pngtree-black.png" alt="">
                </div>
                <div class="col-12 text-center s1-title">Happy <br> Wedding</div>
                <div class="col-12 text-center s1-name">Văn Tiến</div>
                <div class="col-12 text-center s1-heart"><i class="fa-solid fa-heart"></i></div>
                <div class="col-12 text-center s1-name">Hoài Nhi</div>
                <div class="col-12 text-center s1-date">22/09/2024</div>
                <div class="col-12 text-center s1-address">Golden Phoenix Đ. 2 Tháng 9, Hoà Cường Bắc, Hải Châu, Đà Nẵng
                </div>
            </div>
            <div class="col-6 image-background">
                <img src="image.png" class="rip-page" alt="">
                <img src="img-session1.jpeg" alt="" class="img-session1">
            </div>
        </div>
        <div class="row session2">
            <div>
                <button type="button" class="more-button" data-bs-toggle="modal" data-bs-target="#exampleModal">
                    <div class="text-button">
                        Show more
                    </div>
                    <div>
                        <i class="fa-solid fa-plus icon-button"></i>
                    </div>
                </button>
            </div>
        </div>
        <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-scrollable">
                <div class="modal-content">
                    <button type="button" class="btn-close-1" data-bs-dismiss="modal" aria-label="Close">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                    <div class="modal-body">
                        <img src="1.png" alt="">
                        <img src="2.png" alt="">
                        <img src="3.png" alt="">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>

</html>
